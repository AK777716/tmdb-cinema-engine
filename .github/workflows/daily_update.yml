name: Daily Indian & Global Movie Update

on:
  schedule:
    # 02:00 UTC = 07:30 AM IST (Early morning update)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to manually click "Run Workflow" in GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas google-cloud-bigquery requests pandas-gbq python-dotenv

      - name: Run Indian-Focus Pipeline
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          BQ_TABLE: ${{ secrets.BQ_TABLE }}
          # This creates the temporary key file from your GitHub Secret
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp_key.json
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > gcp_key.json
          python full_pipeline.py